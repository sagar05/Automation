name: Prompt-Based EC2 Instance Creation

on:
  workflow_dispatch:
    inputs:
      instance_type:
        description: "Enter EC2 instance type (e.g., t2.micro, t3.medium)"
        required: true
        default: "t2.micro"
      region:
        description: "Enter AWS Region (e.g., us-east-1, eu-west-1)"
        required: true
        default: "us-east-1"
      security_group:
        description: "Enter Security Group ID (e.g., sg-xxxxxxxx)"
        required: true
        default: "sg-xxxxxxx"

jobs:
  deploy_ec2:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.region }}
      INSTANCE_TYPE: ${{ inputs.instance_type }}
      SECURITY_GROUP: ${{ inputs.security_group }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Verify Terraform Installation
        run: terraform --version

      - name: Generate Terraform Configuration Using OpenAI
        run: |
          echo "Generating Terraform configuration..."
          RESPONSE=$(curl -s -X POST "https://api.openai.com/v1/chat/completions" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4",
              "messages": [
                {"role": "system", "content": "You are an AWS Terraform expert."},
                {"role": "user", "content": "Write a Terraform configuration to deploy an EC2 instance in '${AWS_REGION}' with type '${INSTANCE_TYPE}' and security group '${SECURITY_GROUP}'"}
              ]
            }')

          echo "$RESPONSE" | jq -r '.choices[0].message.content' > ec2_instance.tf
          cat ec2_instance.tf

      - name: Initialize Terraform
        run: terraform init

      - name: Validate Terraform Syntax
        run: terraform validate

      - name: Run Terraform Plan (Dry Run)
        run: terraform plan -out=tfplan

      - name: Apply Terraform and Deploy EC2
        run: terraform apply -auto-approve tfplan

      - name: Show Instance Details
        run: terraform output
